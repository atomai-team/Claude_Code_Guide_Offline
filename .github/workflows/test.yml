name: Dashboard Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: dashboard-tests/requirements.txt

      - name: Install dependencies
        run: pip install -r dashboard-tests/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Start gzip HTTP server
        run: |
          python3 serve-gzip.py 18766 &
          sleep 2

      - name: Run pytest
        run: python -m pytest dashboard-tests/ -q --tb=short
        env:
          DASHBOARD_GZIP_URL: http://127.0.0.1:18766
